name: "tasch"
arch: "amd64"
platform: "linux"
version: "0.1.0"
section: "default"
priority: "extra"
maintainer: "Tasch Maintainers <info@tasch.io>"
description: "Tasch — Distributed Task Scheduler"
vendor: "Tasch"
homepage: "https://github.com/deziss/tasch"
license: "MIT"

contents:
  - src: "bin/tasch"
    dst: "/usr/bin/tasch"
  - src: "packaging/tasch.service"
    dst: "/usr/lib/systemd/system/tasch.service"
  - src: "configs/config.default.yaml"
    dst: "/etc/tasch/config.yaml"
    type: "config|noreplace"

scripts:
  postinstall: "packaging/scripts/postinstall.sh"
  preremove: "packaging/scripts/preremove.sh"
